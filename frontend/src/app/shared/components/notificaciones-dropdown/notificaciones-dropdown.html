<button class="ie-topbar-notif-btn" (click)="toggle()" title="Notificaciones">
  <i class="bi bi-bell" [class.has-notif]="noLeidas > 0"></i>
  @if (noLeidas > 0) {
    <span style="position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#d97706;color:#fff;font-size:0.55rem;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center;line-height:1;z-index:999;box-shadow:0 2px 6px rgba(0,0,0,0.25);pointer-events:none;user-select:none;">
      {{ noLeidas > 9 ? '9+' : noLeidas }}
    </span>
  }
</button>
