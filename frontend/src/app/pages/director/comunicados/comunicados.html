<app-entity-crud-page
  [title]="title" [subtitle]="subtitle" [api]="api.comunicados" [idKey]="idKey"
  [columns]="columns" [fields]="fields" [emptyForm]="emptyForm"
  [canCreate]="true" [canEdit]="true" [canDelete]="canDelete"
  [searchable]="searchable" [searchPlaceholder]="searchPlaceholder" [searchFields]="searchFields"
  [sortOptions]="sortOptions" [defaultSort]="defaultSort"
  [headerIcon]="'bi-megaphone'" [accentColor]="'#7a4e9e'" [entityLabel]="'comunicado'"
  [rowCountLabel]="'Comunicados publicados'"
  [colorGradient]="'linear-gradient(135deg, #7a4e9e, #a78bfa)'" [showRowNumber]="true"
  [viewMode]="'cards'" [cardConfig]="cardConfig"
  [deleteFn]="deleteComunicado.bind(this)">
</app-entity-crud-page>
