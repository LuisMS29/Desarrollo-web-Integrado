<div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h1 class="font-display fw-bold h3 mb-1">Comunicados</h1>
      <p class="text-secondary mb-0">Avisos institucionales.</p>
    </div>
    <button class="btn ie-btn-primary" (click)="showForm = !showForm">
      {{ showForm ? 'Cancelar' : 'Nuevo comunicado' }}
    </button>
  </div>

  @if (showForm) {
    <div class="ie-card p-4 mb-4">
      <h2 class="font-display fw-semibold h5 mb-3">Nuevo comunicado</h2>
      <form (ngSubmit)="handleSubmit()">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Título</label>
          <input class="form-control" [(ngModel)]="form.titulo" name="titulo" required />
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Contenido</label>
          <textarea class="form-control" rows="4" [(ngModel)]="form.contenido" name="contenido" required></textarea>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-sm-4">
            <label class="form-label small fw-semibold">Dirigido a</label>
            <select class="form-select" [(ngModel)]="form.dirigidoA" name="dirigidoA">
              @for (o of dirigidoA; track o.value) { <option [value]="o.value">{{ o.label }}</option> }
            </select>
          </div>
          <div class="col-sm-4">
            <label class="form-label small fw-semibold">Fecha de expiración (opcional)</label>
            <input type="date" class="form-control" [(ngModel)]="form.fechaExpiracion" name="fechaExpiracion" />
          </div>
        </div>
        <button class="btn ie-btn-primary" [disabled]="saving">{{ saving ? 'Publicando...' : 'Publicar' }}</button>
      </form>
    </div>
  }

  <app-comunicados-feed [rolActual]="'DOCENTE'" [key]="refreshKey"></app-comunicados-feed>
</div>
