<div class="ie-sidebar" [class.open]="open">
  <div class="ie-sidebar-brand">
    <div class="mark">IE</div>
    <div>
      <div class="name">Intranet Escolar</div>
      <div class="sub">{{ brandSub }}</div>
    </div>
  </div>

  <nav class="ie-nav">
    @for (section of sections; track section.title) {
      <div class="ie-nav-section-title">{{ section.title }}</div>
      @for (item of section.items; track item.route) {
        <a class="nav-link" [class.active]="isActive(item.route, item.end)" [routerLink]="item.route" (click)="close.emit()">
          <span [innerHTML]="item.icon"></span>
          <span>{{ item.label }}</span>
        </a>
      }
    }
  </nav>

  <div class="ie-sidebar-footer">
    <div class="text-white fw-semibold">{{ auth.user()?.username }}</div>
    <div class="mb-2">
      <span class="badge-rol {{ auth.user()?.rol }}">{{ auth.user()?.rol }}</span>
    </div>
    <button class="btn btn-sm btn-outline-light w-100" (click)="onLogout()">
      Cerrar sesión
    </button>
  </div>
</div>

@if (open) {
  <div class="modal-backdrop show d-md-none" (click)="close.emit()"></div>
}
