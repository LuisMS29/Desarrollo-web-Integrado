<div class="ie-shell">
  <app-sidebar [sections]="sections" [open]="sidebarOpen" [collapsed]="sidebarCollapsed" brandSub="Panel del Docente"
    (close)="sidebarOpen = false" (toggleCollapse)="sidebarCollapsed = !sidebarCollapsed"></app-sidebar>
  <div class="ie-main">
    <header class="ie-topbar">
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-soft d-md-none px-2" (click)="sidebarOpen = !sidebarOpen" title="Menú">
          <i class="bi bi-list" style="font-size:1.3rem;"></i>
        </button>
        <div class="ie-topbar-brand-mobile d-md-none">
          <div class="ie-sidebar-brand" style="padding:0;border:none;">
            <div class="mark" style="width:28px;height:28px;font-size:0.8rem;">IE</div>
            <div>
              <div class="name" style="font-size:0.85rem;">Intranet</div>
            </div>
          </div>
        </div>
      </div>

      <div class="fw-semibold text-ink-soft d-none d-md-flex align-items-center gap-2 me-auto">
        <i class="bi bi-hand-wave text-accent" style="font-size:1.1rem;"></i>
        Bienvenido, <span class="text-dark">{{ auth.user()?.nombres || auth.user()?.username }} {{ auth.user()?.apellidos || '' }}</span>
      </div>

      <div class="ie-topbar-right">
        <app-buzon-dropdown></app-buzon-dropdown>
        <app-notificaciones-dropdown></app-notificaciones-dropdown>
        <div class="dropdown">
          <button class="ie-topbar-profile-btn" data-bs-toggle="dropdown" aria-expanded="false">
            @if (auth.user()?.fotoUrl) {
            <img [src]="auth.user()?.fotoUrl" alt="Foto" class="rounded-circle"
              style="width:36px;height:36px;object-fit:cover;border:2px solid var(--ie-line);">
            } @else {
            <div class="ie-avatar">{{ (auth.user()?.username || 'U')[0] | uppercase }}</div>
            }
            <div class="d-none d-md-flex flex-column align-items-start lh-1">
              <span class="fw-semibold text-dark" style="font-size:0.8rem;line-height:1.25;">{{ auth.user()?.username
                }}</span>
              <span class="badge-rol {{ auth.user()?.rol }}" style="font-size:0.55rem;">{{ auth.user()?.rol }}</span>
            </div>
            <i class="bi bi-chevron-down" style="font-size:0.55rem;color:var(--ie-ink-muted);margin-left:0.1rem;"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end" style="min-width:200px;">
            <li><span class="dropdown-item-text small text-ink-soft">
                <div class="fw-semibold text-dark">{{ auth.user()?.username }}</div>
                <div class="text-ink-muted">{{ auth.user()?.username?.toLowerCase() }}@colegio.edu.pe</div>
              </span></li>
            <li>
              <hr class="dropdown-divider">
            </li>
            <li><a class="dropdown-item" routerLink="/docente/perfil">
                <i class="bi bi-person-circle me-2"></i>Mi perfil
              </a></li>
            <li><a class="dropdown-item" routerLink="/docente/perfil">
                <i class="bi bi-shield-lock me-2"></i>Cambiar contraseña
              </a></li>
            <li>
              <hr class="dropdown-divider">
            </li>
            <li><button class="dropdown-item text-danger" (click)="auth.logout()">
                <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
              </button></li>
          </ul>
        </div>
      </div>
    </header>
    <main class="ie-content"><router-outlet></router-outlet></main>
  </div>
</div>
<app-notificaciones-panel></app-notificaciones-panel>
