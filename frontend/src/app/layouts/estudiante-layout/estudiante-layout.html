<div class="ie-shell">
  <app-sidebar [sections]="sections" [open]="sidebarOpen" brandSub="Panel del Estudiante" (close)="sidebarOpen = false"></app-sidebar>
  <div class="ie-main">
    <header class="ie-topbar">
      <button class="btn btn-sm btn-outline-secondary d-md-none" (click)="sidebarOpen = !sidebarOpen">☰ Menú</button>
      <div class="fw-semibold text-secondary d-none d-md-block">Bienvenido, {{ auth.user()?.username }}</div>
      <span class="badge-rol {{ auth.user()?.rol }}">{{ auth.user()?.rol }}</span>
    </header>
    <main class="ie-content"><router-outlet></router-outlet></main>
  </div>
</div>
