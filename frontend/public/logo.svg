<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Color base del logotipo -->
    <style>
      .primary-color { fill: #4B7898; }
      .primary-stroke { stroke: #4B7898; fill: none; }
      .white-color { fill: #FFFFFF; }
      .white-stroke { stroke: #FFFFFF; fill: none; }
      .text-logo { font-family: 'Arial', sans-serif; font-size: 38px; font-weight: bold; fill: #4B7898; letter-spacing: 4px; }
      .text-slogan { font-family: 'Arial', sans-serif; font-size: 26px; font-weight: normal; fill: #4B7898; letter-spacing: 7px; }
    </style>

    <!-- Rutas curvas para alinear el texto circularmente -->
    <!-- Ruta superior (Intranet Escolar) -->
    <path id="top-arc" d="M 80,250 A 170,170 0 1,1 420,250" fill="none" />
    <!-- Ruta inferior (Slogan Here) -->
    <path id="bottom-arc" d="M 120,250 A 130,130 0 0,0 380,250" fill="none" />

    <!-- Definición de una hoja de laurel individual para reutilizar -->
    <path id="leaf" d="M 0,0 C -5,-12 5,-18 15,-18 C 15,-8 5,-2 0,0 Z" class="primary-color" />
  </defs>

  <!-- Anillo exterior delgado -->
  <circle cx="250" cy="250" r="235" class="primary-stroke" stroke-width="6" />

  <!-- Círculo interior sólido -->
  <circle cx="250" cy="250" r="150" class="primary-color" />

  <!-- Textos circulares -->
  <text class="text-logo">
    <!-- Se actualizó el texto aquí -->
    <textPath href="#top-arc" startOffset="50%" text-anchor="middle">INTRANET ESCOLAR</textPath>
  </text>
  
  <text class="text-slogan">
    <textPath href="#bottom-arc" startOffset="50%" text-anchor="middle">SLOGAN HERE</textPath>
  </text>

  <!-- Ramas de Laurel (Izquierda y Derecha) -->
  <g id="laurels">
    <!-- Lado Izquierdo -->
    <g transform="translate(0, 0)">
      <!-- Tallo izquierdo -->
      <path d="M 55,250 A 195,195 0 0,0 120,380" class="primary-stroke" stroke-width="3" stroke-linecap="round"/>
      <!-- Hojas lado izquierdo -->
      <use href="#leaf" transform="translate(60, 230) rotate(-70)" />
      <use href="#leaf" transform="translate(56, 260) rotate(-50)" />
      <use href="#leaf" transform="translate(60, 290) rotate(-30)" />
      <use href="#leaf" transform="translate(71, 320) rotate(-10)" />
      <use href="#leaf" transform="translate(88, 350) rotate(10)" />
      <use href="#leaf" transform="translate(112, 375) rotate(30)" />
      
      <!-- Hojas interiores izquierdas -->
      <use href="#leaf" transform="translate(72, 245) rotate(110)" />
      <use href="#leaf" transform="translate(75, 275) rotate(130)" />
      <use href="#leaf" transform="translate(86, 305) rotate(150)" />
      <use href="#leaf" transform="translate(102, 335) rotate(170)" />
    </g>

    <!-- Lado Derecha (Espejo del izquierdo) -->
    <g transform="translate(500, 0) scale(-1, 1)">
      <!-- Tallo derecho -->
      <path d="M 55,250 A 195,195 0 0,0 120,380" class="primary-stroke" stroke-width="3" stroke-linecap="round"/>
      <!-- Hojas lado derecho -->
      <use href="#leaf" transform="translate(60, 230) rotate(-70)" />
      <use href="#leaf" transform="translate(56, 260) rotate(-50)" />
      <use href="#leaf" transform="translate(60, 290) rotate(-30)" />
      <use href="#leaf" transform="translate(71, 320) rotate(-10)" />
      <use href="#leaf" transform="translate(88, 350) rotate(10)" />
      <use href="#leaf" transform="translate(112, 375) rotate(30)" />
      
      <!-- Hojas interiores derechas -->
      <use href="#leaf" transform="translate(72, 245) rotate(110)" />
      <use href="#leaf" transform="translate(75, 275) rotate(130)" />
      <use href="#leaf" transform="translate(86, 305) rotate(150)" />
      <use href="#leaf" transform="translate(102, 335) rotate(170)" />
    </g>
  </g>

  <!-- Icono Central: Libro y Pluma -->
  <g id="center-icon">
    <!-- Contorno del Libro Abierto -->
    <path d="M 160,290 C 160,290 190,275 250,285 C 310,275 340,290 340,290 L 340,210 C 340,210 310,195 250,205 C 190,195 160,210 160,210 Z" class="white-stroke" stroke-width="10" stroke-linejoin="round" />
    <!-- Línea central del libro -->
    <line x1="250" y1="205" x2="250" y2="285" class="white-stroke" stroke-width="10" stroke-linecap="round" />
    
    <!-- Pluma (Quill) superpuesta -->
    <path d="M 230,265 C 255,220 300,165 330,145 C 320,165 315,190 290,215 C 275,230 240,255 220,275 Z" class="white-color" />
    <path d="M 220,275 L 230,265 L 210,280 Z" class="white-color" />
  </g>
</svg>
